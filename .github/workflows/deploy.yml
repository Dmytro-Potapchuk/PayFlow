name: Build & Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build frontend image
      run: |
        docker build -t keyn1990/bankflay-frontend:latest ./frontend

    - name: Push frontend image
      run: |
        docker push keyn1990/bankflay-frontend:latest

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 192.67.197.185
        username: root
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /root/bankflay
          docker-compose pull
          docker-compose up -d --force-recreate
